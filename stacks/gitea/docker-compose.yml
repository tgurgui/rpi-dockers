services:
  gitea:
    image: gitea/gitea:1.18.1
    container_name: gitea
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__server__ROOT_URL=http://192.168.3.24:3000/
    restart: always
    networks:
      - proxy-nw
    volumes:
      - gitea:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "3000:3000"
      - "222:22"
    
networks:
  proxy-nw:
    external: true

volumes:
  gitea:
    driver: local
